version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chartscanai_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-chartscanai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chartscanai

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chartscanai_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chartscanai

  # REST API Server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: chartscanai_api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3000}
      API_HOST: 0.0.0.0
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-chartscanai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - chartscanai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # WebSocket Server
  websocket:
    build:
      context: .
      dockerfile: docker/Dockerfile.websocket
    container_name: chartscanai_websocket
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      WS_PORT: ${WS_PORT:-3001}
      WS_HOST: 0.0.0.0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${WS_PORT:-3001}:3001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - chartscanai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web Dashboard
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: chartscanai_web
    environment:
      VITE_API_URL: http://api:3000
      VITE_WS_URL: http://websocket:3001
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
      - websocket
    restart: unless-stopped
    networks:
      - chartscanai

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  chartscanai:
    driver: bridge
